appId: com.roxy.app
productName: roxy
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,bun.lockb}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: roxy
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization runs only when Apple credentials are present in the environment
  # (APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID, or an APPLE_API_KEY
  # set). See SIGNING.md. Use `npm run dist:mac` to load them from .env.
  notarize: true
  target:
    - dmg
    - zip
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: roxy
  category: Development
appImage:
  artifactName: ${name}-${version}.${ext}
# Rebuild native deps (better-sqlite3) against Electron's ABI when packaging.
npmRebuild: true
publish:
  provider: github
  owner: FreddyJD
  repo: roxy
